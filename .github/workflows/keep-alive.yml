# GitHub Actions Workflow: Supabase Keep-Alive
# 
# This workflow prevents the Supabase free-tier database from being paused
# by running a keep-alive script every 5 days.
#
# Required GitHub Secrets:
#   - VITE_SUPABASE_URL: Your Supabase project URL
#   - VITE_SUPABASE_ANON_KEY: Your Supabase anonymous key

name: Supabase Keep-Alive

on:
  # Run every 5 days at 00:00 UTC (before the 7-day inactivity limit)
  schedule:
    - cron: '0 0 */5 * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: CSU-MARKETPLACE/csu-marketplace

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: CSU-MARKETPLACE/csu-marketplace/package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔄 Run Keep-Alive Script
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run keep-alive

      - name: ✅ Keep-Alive Complete
        run: |
          echo "🎉 Supabase database has been pinged successfully!"
          echo "📅 Next scheduled run: in 5 days"
